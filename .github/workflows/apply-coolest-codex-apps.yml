name: Apply Coolest Codex Apps Upgrade

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-coolest-codex-apps.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply upgrade patch from previous workflow payload
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/ArcQian-bit/codex-real-engineer-skills/6512dcfe2c94ac0f07075eec9ad3c16d39cc4a66/.github/workflows/apply-coolest-codex-apps.yml \
            | awk '/PATCH_B64/{flag=!flag; next} flag {print}' > /tmp/coolest-codex-apps.patch.gz.b64
          base64 -d /tmp/coolest-codex-apps.patch.gz.b64 | gzip -dc > /tmp/coolest-codex-apps.patch
          git apply --index /tmp/coolest-codex-apps.patch
          rm -f .github/workflows/apply-coolest-codex-apps.yml
          git add -u .github/workflows/apply-coolest-codex-apps.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Expand into Coolest Codex Apps collection"
          git push
