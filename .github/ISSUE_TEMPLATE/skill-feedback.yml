name: Skill feedback
description: Report a prompt where one of the Coolest Codex Apps helped, failed, or triggered unexpectedly.
title: "[Feedback]: "
labels: ["feedback"]
body:
  - type: textarea
    id: prompt
    attributes:
      label: Prompt
      description: Paste the exact prompt or a minimal version of it.
      placeholder: Use pr-reviewer to review this branch...
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Expected app
      options:
        - real-engineer
        - repo-cartographer
        - issue-sherpa
        - pr-reviewer
        - security-scout
        - perf-lab
        - release-captain
        - docs-keeper
        - frontend-polisher
        - migration-pilot
        - Should not trigger
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What did Codex do?
    validations:
      required: true
  - type: textarea
    id: desired
    attributes:
      label: Desired behavior
      description: What should the skill have done instead?
    validations:
      required: false
